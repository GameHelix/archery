<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0f0c29"/>
  <!-- Target rings -->
  <circle cx="44" cy="32" r="14" fill="#1e293b"/>
  <circle cx="44" cy="32" r="11" fill="#3b82f6"/>
  <circle cx="44" cy="32" r="8"  fill="#ef4444"/>
  <circle cx="44" cy="32" r="5"  fill="#f97316"/>
  <circle cx="44" cy="32" r="2.5" fill="#facc15"/>
  <!-- Bow (arc) -->
  <path d="M16 16 Q6 32 16 48" stroke="#c084fc" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="16" y1="16" x2="16" y2="48" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="0"/>
  <!-- Arrow -->
  <line x1="16" y1="32" x2="42" y2="32" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="42,32 38,29.5 38,34.5" fill="#fbbf24"/>
  <!-- Fletching -->
  <line x1="18" y1="32" x2="14" y2="27" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="32" x2="14" y2="37" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Glow dot on bullseye -->
  <circle cx="44" cy="32" r="1.2" fill="#fff" opacity="0.9"/>
</svg>
